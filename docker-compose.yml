services:

  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mcp-server:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/cyberdefense
      - MCP_SERVER_URL=http://mcp-server:8001/sse
    env_file:
      - .env

  mcp-server:
    build: .
    command: ["python", "src/mcp_server.py", "--transport", "sse", "--host", "0.0.0.0", "--port", "8001"]
    ports:
      - "8001:8001"
    env_file:
      - .env

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cyberdefense
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cyberdefense"]
      interval: 5s
      timeout: 5s
      retries: 5
